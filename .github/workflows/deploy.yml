name: Deploy Astro to VPS (Docker)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker info
        run: |
          whoami
          docker --version
          docker info

      - name: Build Docker image
        run: |
          docker build -t astro-portfolio:latest .

      - name: Deploy container
        run: |
          cd /home/dayb/apps/astro-portfolio
          ls -la
          docker compose up -d
          docker ps
          docker image prune -f